<script>
// ─────────────────────────────────────────────
// SAVE / COPY OUTPUT
// ─────────────────────────────────────────────
function downloadOutput() {
  const json = JSON.stringify(outputData, null, 2);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
  a.download = 'parts.json';
  a.click();
}

function copyOutput() {
  navigator.clipboard.writeText(JSON.stringify(outputData, null, 2)).then(() => {
    document.getElementById('copyNote').textContent = '✓ Copied!';
    setTimeout(() => document.getElementById('copyNote').textContent = '', 2000);
  });
}

// ─────────────────────────────────────────────
// TEST MATCH AFTER GENERATION
// ─────────────────────────────────────────────
async function testMatch(inp) {
  if (!inp.files[0] || !outputData.length) return;

  const hfBase = document.getElementById('hfUrl').value.replace(/\/$/, '');
  const el = document.getElementById('testMatches');

  el.innerHTML = '<div style="color:var(--text2);font-size:13px">⏳ Getting CLIP embedding for test image…</div>';

  try {
    const reader = new FileReader();

    reader.onload = async (e) => {
      const dataUrl = e.target.result;

      // Get embedding for uploaded test image
      const queryEmb = await getClipEmbedding(dataUrl, hfBase);

      // Match against products using YOUR JSON structure
      const scored = outputData
        .filter(p => Array.isArray(p.fingerprint) && p.fingerprint.length > 0)
        .map(p => {
          const best = cosine(queryEmb, p.fingerprint);
          return { ...p, score: best };
        })
        .sort((a, b) => b.score - a.score)
        .slice(0, 5);

      const imgs = p => Array.isArray(p.image) ? p.image : (p.image ? [p.image] : []);

      el.innerHTML =
        `<div style="font-size:12px;color:var(--text3);margin-bottom:8px">Top matches using CLIP:</div>` +
        scored.map((p, i) => `
          <div style="display:flex;align-items:center;gap:10px;padding:8px;background:var(--surface);border-radius:8px;margin-bottom:6px;${i===0?'border:1px solid rgba(212,92,42,0.3)':''}">
            <img src="${imgs(p)[0] || ''}" style="width:40px;height:40px;object-fit:cover;border-radius:6px"/>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600">${p.name}</div>
              <div style="font-size:11px;color:var(--text3)">${p.sku} · ${p.category}</div>
            </div>
            <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--accent)">
              ${Math.round(p.score * 100)}%
            </div>
          </div>
        `).join('');
    };

    reader.readAsDataURL(inp.files[0]);

  } catch (e) {
    el.innerHTML = `<div style="color:var(--danger);font-size:13px">Error: ${e.message}</div>`;
  }
}
</script>
